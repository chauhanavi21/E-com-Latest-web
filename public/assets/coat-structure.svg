<path d="M0 -240 L 40 -190 L 6 -66 L 0 -84 Z" fill="#F7F7F5" opacity="0.25"/>
<line x1="0" y1="-60" x2="0" y2="204" stroke="#F7F7F5" stroke-width="2.5" opacity="0.35"/>
<circle cx="14" cy="-20" r="4" fill="#F7F7F5" opacity="0.5"/><circle cx="14" cy="40" r="4" fill="#F7F7F5" opacity="0.5"/>
<circle cx="14" cy="100" r="4" fill="#F7F7F5" opacity="0.5"/>
</g></g>
</svg>