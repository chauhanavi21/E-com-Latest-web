<rect width="1600" height="900" fill="#F7F7F5"/>
<g opacity="0.9">
<path d="M300 200 L 240 226 C 228 320, 228 480, 238 680 L 362 680 C 372 480, 372 320, 360 226 Z" fill="#111111"/>
