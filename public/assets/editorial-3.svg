</filter>

<linearGradient id="tone" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#111111"/><stop offset="1" stop-color="#3a3a3a"/>
</linearGradient>
<linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#DDD9D2"/><stop offset="1" stop-color="#C9C9C6"/>
</linearGradient>
</defs>
<rect width="1600" height="900" fill="#F7F7F5"/>
