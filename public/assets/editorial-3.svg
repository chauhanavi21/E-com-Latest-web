<line x1="80" y1="790" x2="1520" y2="790" stroke="#C9C9C6" stroke-width="1"/>
<text x="80" y="840" font-family="Georgia, serif" font-size="26" fill="#6F6F6F" letter-spacing="6">THREE CUTS. ONE LINE.</text>
</g>
